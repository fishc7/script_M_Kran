{% extends "base.html" %}

{% block title %}Формирование ИД в папку - M_Kran Web Interface{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">
                    <i class="fas fa-folder-plus text-success me-2"></i>
                    Формирование ИД в папку
                </h1>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary" onclick="goBack()">
                        <i class="fas fa-arrow-left me-1"></i>
                        Назад
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Пустая область для будущего контента -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center py-5">
                    <div class="display-4 text-muted mb-3">
                        <i class="fas fa-folder-open"></i>
                    </div>
                    <h4 class="text-muted">Страница в разработке</h4>
                    <p class="text-muted">Функциональность формирования ИД в папку будет добавлена позже</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Возврат назад
function goBack() {
    window.location.href = '/id_formation';
}
</script>
{% endblock %}
